# dnsmasq configuration for PXE boot

# Interface configuration (adjust as needed)
interface=eth0
bind-interfaces

# DHCP Configuration
# Adjust the range to match your network
dhcp-range=192.168.10.100,192.168.10.200,255.255.255.0,12h

# Gateway and DNS
dhcp-option=option:router,192.168.10.1
dhcp-option=option:dns-server,192.168.10.1

# PXE Boot Configuration
# Enable TFTP
enable-tftp
tftp-root=/tftpboot

# PXE Boot for BIOS clients
dhcp-match=set:bios,option:client-arch,0
dhcp-boot=tag:bios,undionly.kpxe

# PXE Boot for UEFI clients
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9
dhcp-boot=tag:efi64,ipxe.efi

# iPXE chainloading - when iPXE is already loaded, point to boot script
dhcp-match=set:ipxe,175
dhcp-boot=tag:ipxe,boot.ipxe

# Log all DHCP transactions
log-dhcp

# Include additional host reservations (generated dynamically)
conf-dir=/etc/dnsmasq.d
