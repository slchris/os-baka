version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: hub.infra.plz.ac/library/postgres:15-alpine
    container_name: osbaka-db
    environment:
      POSTGRES_DB: osbaka
      POSTGRES_USER: osbaka
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    # Uncomment below to access DB directly from host for debugging:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U osbaka" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: osbaka-backend
    environment:
      DATABASE_URL: postgresql://osbaka:password@db:5432/osbaka
      SECRET_KEY: change-this-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost
      # Vault integration (uncomment to enable)
      # VAULT_ENABLED: "true"
      # VAULT_ADDR: "http://vault:8200"
      # VAULT_TOKEN: "dev-root-token"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # HashiCorp Vault (optional - for secret management)
  # Enable with: docker compose --profile vault up
  vault:
    image: hashicorp/vault:1.15
    container_name: osbaka-vault
    profiles:
      - vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data

  # Frontend (React - New UI)
  frontend:
    image: hub.infra.plz.ac/library/node:20-alpine
    container_name: osbaka-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
  vault_data:
