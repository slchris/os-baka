version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: hub.infra.plz.ac/library/postgres:15-alpine
    container_name: osbaka-db
    environment:
      POSTGRES_DB: osbaka
      POSTGRES_USER: osbaka
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    # Uncomment below to access DB directly from host for debugging:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U osbaka" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: osbaka-backend
    environment:
      DATABASE_URL: postgresql://osbaka:password@db:5432/osbaka
      SECRET_KEY: change-this-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Frontend (React - New UI)
  frontend:
    image: hub.infra.plz.ac/library/node:20-alpine
    container_name: osbaka-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
